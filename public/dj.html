<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jukebox - Dashboard</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
<div class="page wide">

  <!-- Create/Rejoin View -->
  <div id="createView">
    <div class="text-center mb-md">
      <span class="logo">♫</span>
      <h1>Dashboard</h1>
      <p class="subtitle">Create or rejoin a session</p>
    </div>

    <div class="card">
      <h3>New Session</h3>
      <label class="field-label">Session Name</label>
      <input id="sessName" type="text" placeholder="e.g. Monday Jazz Night">
      <label class="field-label">PIN</label>
      <input id="sessPin" type="password" placeholder="For managing requests">
      <button id="createBtn" class="btn btn-primary">Create Session</button>
    </div>

    <div class="card">
      <h3>Rejoin Session</h3>
      <label class="field-label">Session Code</label>
      <input id="rejoinCode" type="text" placeholder="ABC123" style="text-transform:uppercase;">
      <label class="field-label">PIN</label>
      <input id="rejoinPin" type="password" placeholder="Your session PIN">
      <button id="rejoinBtn" class="btn btn-secondary">Rejoin</button>
    </div>

    <div id="createError" class="flash flash-error hidden"></div>

    <!-- Past Sessions -->
    <div class="mt-lg">
      <div style="cursor:pointer;" onclick="toggleHistory()" id="historyToggle">
        <h3 style="display:inline;">Past Sessions</h3>
        <span class="text-dim" id="historyArrow">▸</span>
      </div>
      <div id="historyList" class="hidden mt-sm"></div>
    </div>
  </div>

  <!-- Active Session View -->
  <div id="sessionView" class="hidden">
    <div class="text-center">
      <a href="/dj.html" class="btn-ghost" style="position:absolute;left:20px;top:20px;">← Back</a>
      <h2 id="djSessionName"></h2>
      <div class="session-code" id="djCode"></div>
      <div class="qr-container" id="qrContainer"></div>
      <p class="text-sm text-muted mb-md">Scan to request songs</p>
    </div>

    <div class="card">
      <div class="toggle-row">
        <span>Accepting Requests</span>
        <input type="checkbox" class="toggle" id="activeToggle" checked>
      </div>
    </div>

    <!-- Now Playing -->
    <div id="nowPlayingDj" class="now-playing hidden">
      <div class="label">Now Playing</div>
      <div class="song-name" id="npSongDj"></div>
      <div class="artist-name" id="npArtistDj"></div>
      <button class="btn btn-secondary btn-sm mt-sm" id="markPlayedBtn">Mark as Played</button>
    </div>

    <!-- Queue -->
    <div class="card card-flush mt-md">
      <div class="section-header">
        <h3>Queue</h3>
        <span class="badge" id="queueCount">0</span>
      </div>
      <div id="djQueue"></div>
    </div>

    <!-- Stats -->
    <div class="text-center text-sm text-muted mt-md" id="djStats"></div>
  </div>

</div>

<script>
let currentSession = null;
let pin = '';
let djRequests = [];

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showError(msg) {
  const el = document.getElementById('createError');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 4000);
}

// Create session
document.getElementById('createBtn').addEventListener('click', async () => {
  const name = document.getElementById('sessName').value.trim();
  pin = document.getElementById('sessPin').value;
  if (!pin) { showError('PIN is required'); return; }
  const res = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, pin })
  });
  if (!res.ok) { showError('Failed to create session'); return; }
  currentSession = await res.json();
  showSession();
});

// Rejoin session
document.getElementById('rejoinBtn').addEventListener('click', async () => {
  const code = document.getElementById('rejoinCode').value.trim().toUpperCase();
  pin = document.getElementById('rejoinPin').value;
  if (!code || !pin) { showError('Code and PIN required'); return; }
  const res = await fetch('/api/sessions/' + code + '/verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pin })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    showError(err.error || 'Failed to rejoin');
    return;
  }
  currentSession = await res.json();
  showSession();
});

function showSession() {
  document.getElementById('createView').classList.add('hidden');
  document.getElementById('sessionView').classList.remove('hidden');
  document.getElementById('djSessionName').textContent = currentSession.name || 'Session';
  document.getElementById('djCode').textContent = currentSession.id;
  document.getElementById('activeToggle').checked = currentSession.active !== 0;

  const url = window.location.origin + '/s/' + currentSession.id;
  const qr = qrcode(0, 'M');
  qr.addData(url);
  qr.make();
  document.getElementById('qrContainer').innerHTML = qr.createImgTag(5, 0);

  loadDjRequests();
  setInterval(loadDjRequests, 5000);
}

async function loadDjRequests() {
  const res = await fetch('/api/sessions/' + currentSession.id + '/requests');
  djRequests = await res.json();
  
  const playing = djRequests.find(r => r.status === 'playing');
  const queued = djRequests.filter(r => r.status === 'queued');
  const played = djRequests.filter(r => r.status === 'played' || r.status === 'skipped');

  // Now playing
  const npDiv = document.getElementById('nowPlayingDj');
  if (playing) {
    npDiv.classList.remove('hidden');
    document.getElementById('npSongDj').textContent = playing.song;
    document.getElementById('npArtistDj').textContent = playing.artist || '';
    document.getElementById('markPlayedBtn').onclick = () => updateStatus(playing.id, 'played');
  } else {
    npDiv.classList.add('hidden');
  }

  // Queue
  document.getElementById('queueCount').textContent = queued.length;
  const queueDiv = document.getElementById('djQueue');
  if (queued.length === 0) {
    queueDiv.innerHTML = '<div class="empty-state"><span class="icon">🎵</span>No songs in queue</div>';
  } else {
    queueDiv.innerHTML = queued.map(r => `
      <div class="queue-item">
        <div class="vote-col">
          <div style="font-size:18px;font-weight:700;color:var(--accent);">${r.votes}</div>
          <div class="text-dim" style="font-size:10px;">votes</div>
        </div>
        <div class="song-info">
          <div class="song-title">${esc(r.song)}</div>
          ${r.artist ? `<div class="song-artist">${esc(r.artist)}</div>` : ''}
        </div>
        <div class="actions">
          <button class="btn btn-primary btn-sm" onclick="updateStatus(${r.id},'playing')">▶</button>
          <button class="btn btn-secondary btn-sm" onclick="updateStatus(${r.id},'skipped')">Skip</button>
          <button class="btn btn-ghost btn-sm" onclick="deleteReq(${r.id})" style="color:var(--text-dim);">✕</button>
        </div>
      </div>
    `).join('');
  }

  // Stats
  const uniqueRequesters = new Set(djRequests.map(r => r.requester_id)).size;
  document.getElementById('djStats').textContent = 
    `${djRequests.length} total requests · ${uniqueRequesters} unique requesters`;
}

async function updateStatus(id, status) {
  await fetch('/api/requests/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'X-Pin': pin },
    body: JSON.stringify({ status })
  });
  loadDjRequests();
}

async function deleteReq(id) {
  await fetch('/api/requests/' + id, {
    method: 'DELETE',
    headers: { 'X-Pin': pin }
  });
  loadDjRequests();
}

document.getElementById('activeToggle').addEventListener('change', async (e) => {
  await fetch('/api/sessions/' + currentSession.id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'X-Pin': pin },
    body: JSON.stringify({ active: e.target.checked })
  });
});

// Session history
async function toggleHistory() {
  const list = document.getElementById('historyList');
  const arrow = document.getElementById('historyArrow');
  if (list.classList.contains('hidden')) {
    list.classList.remove('hidden');
    arrow.textContent = '▾';
    const sessions = await fetch('/api/sessions').then(r => r.json());
    if (sessions.length === 0) {
      list.innerHTML = '<p class="text-dim text-sm">No sessions yet.</p>';
      return;
    }
    list.innerHTML = `<table class="history-table">
      <tr><th>Date</th><th>Name</th><th>Requests</th><th></th></tr>
      ${sessions.map(s => {
        const date = s.created_at ? new Date(s.created_at + 'Z').toLocaleDateString() : '';
        return `<tr>
          <td>${date}</td>
          <td>${esc(s.name || s.id)}</td>
          <td>${s.request_count}</td>
          <td><a href="/api/sessions/${s.id}/export">Export CSV</a></td>
        </tr>`;
      }).join('')}
    </table>`;
  } else {
    list.classList.add('hidden');
    arrow.textContent = '▸';
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jukebox</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container" style="text-align:center; padding-top:80px;">
  <h1>🎵 Jukebox</h1>
  <p class="muted" style="margin-bottom:24px;">Enter a session code to request songs</p>
  <form id="joinForm">
    <input id="code" type="text" placeholder="Session code (e.g. ABC123)" maxlength="6" autocapitalize="characters" style="text-align:center; font-size:1.4rem; letter-spacing:4px;">
    <button type="submit">Join Session</button>
  </form>
  <p class="muted" style="margin-top:32px;">Are you the musician? <a href="/dj.html">Open DJ Dashboard</a></p>
</div>
<script>
document.getElementById('joinForm').addEventListener('submit', e => {
  e.preventDefault();
  const code = document.getElementById('code').value.trim().toUpperCase();
  if (code) window.location.href = '/s/' + code;
});
</script>
</body>
</html>

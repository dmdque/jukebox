<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jukebox</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="page page-center">
  <span class="logo">♫</span>
  <h1>Jukebox</h1>
  <p class="subtitle">Request songs for tonight's set</p>
  
  <div style="width:100%;max-width:320px;">
    <label class="field-label">Session Code</label>
    <input id="code" type="text" placeholder="ABC123" style="text-align:center;font-size:20px;letter-spacing:4px;text-transform:uppercase;" maxlength="10">
    <button class="btn btn-primary mt-sm" onclick="go()">Join Session</button>
    <div id="error" class="flash flash-error hidden mt-md"></div>
  </div>
  
  <div class="divider" style="width:60px;margin:32px auto;"></div>
  
  <a href="/dj.html" class="btn-ghost">Musician? Open Dashboard →</a>
</div>

<script>
function go() {
  const code = document.getElementById('code').value.trim().toUpperCase();
  if (!code) return;
  window.location.href = '/s/' + code;
}
document.getElementById('code').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') go();
});
</script>
</body>
</html>
